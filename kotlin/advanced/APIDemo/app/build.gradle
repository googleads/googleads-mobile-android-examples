import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.dsl.KotlinVersion

plugins {
    id 'com.android.application'
    id 'com.google.devtools.ksp' version '2.3.4' apply false
}

android {
    namespace = 'com.google.android.gms.example.apidemo'
    compileSdk(35)
    defaultConfig {
        applicationId "com.google.android.gms.example.apidemo"
        minSdkVersion(23)
        targetSdkVersion(35)
        versionCode(1)
        versionName = "1.0"
        multiDexEnabled = true
    }
    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles(getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro')
        }
    }
    buildFeatures {
        viewBinding = true
    }
    compileOptions {
        sourceCompatibility = JavaLanguageVersion.of(8)
        targetCompatibility = JavaLanguageVersion.of(8)
    }
}

dependencies {
    // AndroidX UI Components
    implementation('androidx.appcompat:appcompat:1.7.1')
    implementation('androidx.constraintlayout:constraintlayout:2.1.4')
    implementation('com.google.android.material:material:1.12.0')

    // AndroidX KTX Extensions (Fragment, Activity)
    implementation('androidx.activity:activity-ktx:1.10.1')
    implementation('androidx.fragment:fragment-ktx:1.8.8')
    implementation('androidx.preference:preference-ktx:1.2.1')

    // AndroidX Lifecycle Components (ViewModel, LiveData, Runtime)
    implementation('androidx.lifecycle:lifecycle-livedata-ktx:2.9.1')
    implementation('androidx.lifecycle:lifecycle-runtime-ktx:2.9.1')
    implementation('androidx.lifecycle:lifecycle-viewmodel-ktx:2.9.1')
    implementation('androidx.lifecycle:lifecycle-process:2.9.2')

    // Google Play Services
    implementation('com.google.android.gms:play-services-ads:25.1.0')
    implementation('com.google.android.ump:user-messaging-platform:4.0.0')
}

kotlin {
    compilerOptions {
        languageVersion = KotlinVersion.KOTLIN_2_1
        jvmTarget = JvmTarget.JVM_1_8
    }
}
