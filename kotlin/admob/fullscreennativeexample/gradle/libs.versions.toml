# gradle/libs.versions.toml

# gradle/libs.versions.toml
# ... other sections

[versions]
# AndroidX Libraries
androidx-appcompat = "1.7.1"
androidx-constraintlayout = "2.2.1"
androidx-core-ktx = "1.16.0"
kotlinx-coroutines = "1.8.0" # Or your desired version

# Google Play Services
play-services-ads = "24.4.0"

# SDK Versions
compileSdk = "36"
minSdk = "23"
targetSdk = "36"

[libraries]
# AndroidX Libraries
androidx-appcompat = { group = "androidx.appcompat", name = "appcompat", version.ref = "androidx-appcompat" }
androidx-constraintlayout = { group = "androidx.constraintlayout", name = "constraintlayout", version.ref = "androidx-constraintlayout" }
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "androidx-core-ktx" }
kotlinx-coroutines-android = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-android", version.ref = "kotlinx-coroutines" }

# Google Play Services
play-services-ads = { group = "com.google.android.gms", name = "play-services-ads", version.ref = "play-services-ads" }

[plugins]
# Add plugins here if you want to centralize them, for now we'll leave them in build.gradle.kts for simplicity
android-application = { id = "com.android.application", version = "8.11.0" } # Example: You'll need to specify your actual AGP version
kotlin-android = { id = "org.jetbrains.kotlin.android", version = "2.1.0" } # Example: You'll need to specify your actual Kotlin Gradle Plugin version
